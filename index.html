<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARALLAX DARK</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#000;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    overflow:hidden;
    font-family:Arial, Helvetica, sans-serif;
}



.contenedor{
    width:400px;
    height:700px;
    position:relative;
    overflow:hidden;
    border-radius:20px;

    background:black;

    box-shadow:
    0 0 40px rgba(255,0,0,0.4),
    0 0 100px rgba(255,80,0,0.2);

    border:1px solid rgba(255,255,255,0.1);
}



.paisaje{
    width:140%;
    height:100%;
    object-fit:cover;

    position:absolute;
    left:-90px;
    bottom:0;

    z-index:1;

    animation:paisaje 15s ease-out forwards;
}

@keyframes paisaje{

    from{
        transform:scale(1.2);
        filter:blur(3px) brightness(0.5);
    }

    to{
        transform:scale(1);
        filter:blur(0px) brightness(0.8);
    }
}


.persona{
    width:230px;

    position:absolute;
    left:50%;
    bottom:40px;

    transform:translateX(-50%);

    z-index:4;

    animation:entrada 5s ease-out forwards;

    filter:
    brightness(1.3)
    drop-shadow(0 0 10px #ff6600)
    drop-shadow(0 0 25px rgba(255,120,0,0.9))
    drop-shadow(0 0 50px rgba(255,60,0,0.7));
}

@keyframes entrada{

    from{
        transform:translateX(-50%) scale(0.7);
        opacity:0;
        filter:
        brightness(0.3)
        blur(6px);
    }

    to{
        transform:translateX(-50%) scale(1);
        opacity:1;
    }
}



.vapor{
    width:180%;

    position:absolute;
    left:-180px;
    bottom:-20px;

    opacity:0.30;

    z-index:5;

    animation:vapor 14s linear infinite;

    mix-blend-mode:screen;
}

@keyframes vapor{

    from{
        transform:translateX(0);
    }

    to{
        transform:translateX(-120px);
    }
}


.vapor2{
    width:160%;

    position:absolute;
    left:-100px;
    top:120px;

    opacity:0.18;

    z-index:3;

    transform:rotate(180deg);

    animation:vapor2 20s ease-in-out infinite;

    mix-blend-mode:screen;

    filter:
    blur(2px)
    brightness(1.4)
    drop-shadow(0 0 20px rgba(255,120,0,0.2));
}

@keyframes vapor2{

    0%{
        transform:
        translateX(0px)
        translateY(0px)
        rotate(180deg)
        scale(1);
    }

    50%{
        transform:
        translateX(-40px)
        translateY(20px)
        rotate(183deg)
        scale(1.05);
    }

    100%{
        transform:
        translateX(0px)
        translateY(0px)
        rotate(180deg)
        scale(1);
    }
}



.luz{
    width:500px;
    height:500px;

    background:
    radial-gradient(
        circle,
        rgba(255,80,0,0.25),
        transparent 70%
    );

    position:absolute;

    left:50%;
    top:50%;

    transform:translate(-50%,-50%);

    z-index:2;

    animation:luz 4s ease-in-out infinite;
}

@keyframes luz{

    0%{
        opacity:0.4;
        transform:translate(-50%,-50%) scale(1);
    }

    50%{
        opacity:0.8;
        transform:translate(-50%,-50%) scale(1.1);
    }

    100%{
        opacity:0.4;
        transform:translate(-50%,-50%) scale(1);
    }
}



.contenedor::after{

    content:"";

    position:absolute;
    inset:0;

    background:
    radial-gradient(
        circle at center,
        transparent 40%,
        rgba(0,0,0,0.75) 100%
    );

    z-index:10;
    pointer-events:none;
}

</style>
</head>

<body>

<div class="contenedor">
    
    <div class="luz"></div>
    
    <img class="paisaje" src="img/infierno.jpg" alt="">

    <img class="vapor2" src="img/humo2.png" alt="">

    <img class="persona" src="img/pngwing.com (12).png" alt="">

    <img class="vapor" src="img/VAPOR.png" alt="">

</div>

</body>
</html>
